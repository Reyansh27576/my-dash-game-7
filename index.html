<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Dash: Expansion</title>
    <style>
        body {
            display: flex; flex-direction: column; align-items: center;
            margin: 0; background-color: #050505; font-family: 'Segoe UI', sans-serif;
            color: white; touch-action: none; overflow: hidden;
        }
        #game-container { position: relative; width: 95vw; max-width: 800px; margin-top: 10px; }
        canvas { border: 2px solid #333; border-radius: 8px; width: 100%; background: #000; }
        
        /* UI Overlays */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: rgba(0,0,0,0.85); border-radius: 8px; z-index: 10;
        }
        .hidden { display: none !important; }
        
        #stats { width: 95vw; max-width: 800px; display: flex; justify-content: space-between; padding: 10px; font-weight: bold; }
        .btn { 
            padding: 12px 24px; margin: 5px; border: none; border-radius: 5px; 
            cursor: pointer; font-weight: bold; text-transform: uppercase;
        }
        .btn-green { background: #27ae60; color: white; }
        .btn-blue { background: #2980b9; color: white; }
        
        /* Shop Styling */
        #shop-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90vw; max-width: 600px; height: 70vh; background: #1a1a1a;
            border: 2px solid #444; border-radius: 15px; padding: 20px; z-index: 100;
            overflow-y: auto;
        }
        .shop-section { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; }
        .item { 
            background: #252525; border: 2px solid #444; padding: 10px; text-align: center; 
            cursor: pointer; font-size: 10px; border-radius: 5px;
        }
        .unlocked { border-color: #0f0; }
        .equipped { background: #0f0; color: black; }
        
        #quest-tag { background: #f1c40f; color: black; padding: 5px 10px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>

<div id="stats">
    <span>💰 <span id="coinText">0</span></span>
    <span id="quest-tag">Quest: <span id="jumpCount">0</span>/50 Jumps</span>
    <button class="btn-blue" style="padding: 5px 10px;" onclick="toggleShop()">🛒 Shop</button>
</div>

<div id="game-container">
    <div id="death-screen" class="overlay hidden">
        <h1 style="color: #ff3300; font-size: 48px;">YOU DIED</h1>
        <p>Score: <span id="finalScore">0</span></p>
        <button class="btn-green" onclick="resetGame()">Restart</button>
    </div>
    
    <canvas id="game" width="800" height="400"></canvas>
</div>

<div id="shop-modal" class="hidden">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>DASH SHOP</h2>
        <button class="btn-blue" onclick="toggleShop()">Close</button>
    </div>
    
    <div class="shop-section">
        <h3>NEON COLORS</h3>
        <div class="grid" id="colorGrid"></div>
    </div>
    
    <div class="shop-section">
        <h3>TRAILS</h3>
        <div class="grid" id="trailGrid"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    let data = JSON.parse(localStorage.getItem("dash_v3")) || {
        coins: 0,
        jumps: 0,
        unlockedColors: ["#00ff00"],
        unlockedTrails: ["none"],
        equippedColor: "#00ff00",
        equippedTrail: "none"
    };

    const colors = [
        {id: "#00ff00", p: 0}, {id: "#ff00ff", p: 5}, {id: "#00ffff", p: 5},
        {id: "#ffff00", p: 10}, {id: "#ff3300", p: 10}, {id: "#ffffff", p: 15},
        {id: "#39ff14", p: 20}, {id: "#bc13fe", p: 20} // Neon additions
    ];
    const trails = [
        {id: "none", p: 0}, {id: "simple", p: 10}, {id: "neon", p: 25}, {id: "fire", p: 50}
    ];

    let score = 0, speed = 6, gameActive = true, obstacles = [], frame = 0, trailHistory = [];
    const groundY = 350;
    const player = { x: 100, y: 310, w: 40, h: 40, dy: 0 };

    function save() {
        localStorage.setItem("dash_v3", JSON.stringify(data));
        document.getElementById("coinText").innerText = data.coins;
        document.getElementById("jumpCount").innerText = data.jumps;
        renderShop();
    }

    function toggleShop() { document.getElementById("shop-modal").classList.toggle("hidden"); }

    function renderShop() {
        const cGrid = document.getElementById("colorGrid");
        cGrid.innerHTML = "";
        colors.forEach(item => {
            const div = createShopItem(item, data.unlockedColors, data.equippedColor, 'color');
            cGrid.appendChild(div);
        });

        const tGrid = document.getElementById("trailGrid");
        tGrid.innerHTML = "";
        trails.forEach(item => {
            const div = createShopItem(item, data.unlockedTrails, data.equippedTrail, 'trail');
            tGrid.appendChild(div);
        });
    }

    function createShopItem(item, unlockedList, equippedItem, type) {
        const div = document.createElement("div");
        const isUnlocked = unlockedList.includes(item.id);
        const isEquipped = equippedItem === item.id;
        div.className = `item ${isUnlocked ? 'unlocked' : ''} ${isEquipped ? 'equipped' : ''}`;
        
        if (type === 'color') div.style.borderBottom = `5px solid ${item.id}`;
        div.innerHTML = isUnlocked ? (isEquipped ? "EQUIPPED" : "USE") : item.p + "💰";
        
        div.onclick = () => {
            if (isUnlocked) {
                if(type === 'color') data.equippedColor = item.id;
                else data.equippedTrail = item.id;
            } else if (data.coins >= item.p) {
                data.coins -= item.p;
                unlockedList.push(item.id);
            }
            save();
        };
        return div;
    }

    function jump() {
        if (player.y >= groundY - player.h) {
            player.dy = -16;
            data.jumps++;
            if (data.jumps === 50) {
                data.coins += 2;
                data.jumps = 0;
                alert("Quest Complete! +2 Coins");
            }
            save();
        }
    }

    function loop() {
        if (!gameActive) return;
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,800,400);
        ctx.fillStyle = "#111"; ctx.fillRect(0, groundY, 800, 50);

        player.dy += 0.9; player.y += player.dy;
        if(player.y > groundY - player.h) { player.y = groundY - player.h; player.dy = 0; }

        // Trail logic
        if (data.equippedTrail !== "none") {
            trailHistory.push({x: player.x, y: player.y});
            if (trailHistory.length > 10) trailHistory.shift();
            trailHistory.forEach((pos, i) => {
                ctx.globalAlpha = i / 10;
                ctx.fillStyle = data.equippedTrail === 'fire' ? '#ff6600' : data.equippedColor;
                ctx.fillRect(pos.x, pos.y, player.w, player.h);
            });
            ctx.globalAlpha = 1;
        }

        if (frame % 100 === 0) obstacles.push({x: 850, w: 40, h: Math.random() > 0.5 ? 40 : 70, passed: false});

        obstacles.forEach((o, i) => {
            o.x -= speed;
            ctx.fillStyle = "#ff0044"; ctx.fillRect(o.x, groundY - o.h, o.w, o.h);
            
            if (player.x < o.x + o.w - 5 && player.x + player.w > o.x + 5 && player.y + player.h > groundY - o.h + 5) {
                gameActive = false;
                document.getElementById("death-screen").classList.remove("hidden");
                document.getElementById("finalScore").innerText = score;
            }
            if (!o.passed && o.x < player.x) {
                o.passed = true; score++; speed += 0.05;
                if (score % 25 === 0) { data.coins++; save(); }
            }
            if (o.x < -100) obstacles.splice(i, 1);
        });

        ctx.fillStyle = data.equippedColor; ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.strokeStyle = "white"; ctx.strokeRect(player.x, player.y, player.w, player.h);

        frame++;
        requestAnimationFrame(loop);
    }

    function resetGame() {
        score = 0; speed = 6; obstacles = []; frame = 0; trailHistory = [];
        gameActive = true;
        document.getElementById("death-screen").classList.add("hidden");
        loop();
    }

    window.addEventListener("keydown", (e) => { if(e.code === "Space") jump(); });
    window.addEventListener("pointerdown", (e) => { if(gameActive) jump(); });

    save(); renderShop(); loop();
</script>
</body>
</html>
